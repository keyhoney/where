<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeju Meet Tracker</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <section class="map-wrap">
      <div id="map"></div>
      <div id="loadingSkeleton" class="loading-skeleton">
        <div class="sk-header shimmer"></div>
        <div class="sk-line shimmer"></div>
        <div class="sk-line shimmer short"></div>
      </div>

      <div class="top-overlay">
        <div class="share-state-banner" id="shareStateBanner">현재 공유 중</div>
      </div>

      <div class="distance-panel collapsed" id="distancePanel">
        <div class="sheet-handle" id="sheetHandle"></div>
        <strong>가까운 순 거리</strong>
        <div id="distanceList" class="distance-cards">
          <div class="distance-card empty">위치 수집 후 다른 사용자와의 거리가 표시됩니다.</div>
        </div>
      </div>

      <div class="bottom-floating-bar">
        <button id="hideMyMarkerBtn" class="secondary">내 마커 숨기기</button>
        <button id="myLocationBtn" class="secondary">내 위치</button>
      </div>
      <div class="toast" id="toast"></div>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="./app.js"></script>
</body>
</html>

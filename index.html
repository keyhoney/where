<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeju Meet Tracker</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <section class="map-wrap">
      <div id="map"></div>
      <div id="loadingSkeleton" class="loading-skeleton">
        <div class="sk-header shimmer"></div>
        <div class="sk-line shimmer"></div>
        <div class="sk-line shimmer short"></div>
      </div>

      <div class="top-overlay">
        <h1>제주 모임 트래커</h1>
        <div class="permission-tip">위치 권한을 허용해야 서로 위치를 확인할 수 있습니다.</div>
        <div class="share-state-banner" id="shareStateBanner">현재 공유 중</div>
        <div class="badge-row">
          <span class="badge badge-neutral" id="myStatusBadge">대기 중</span>
          <span class="badge badge-info">주기: <span id="currentInterval">-</span></span>
          <span class="badge badge-warn">모임 요청자: <span id="meetingBy">-</span></span>
        </div>
        <div class="meeting-meter-wrap">
          <div class="meeting-meter" id="meetingMeter"></div>
          <div class="meeting-meter-text" id="meetingRemain">-</div>
        </div>
      </div>

      <div class="distance-panel collapsed" id="distancePanel">
        <div class="sheet-handle" id="sheetHandle"></div>
        <strong>가까운 순 거리</strong>
        <div id="distanceList" class="distance-cards">
          <div class="distance-card empty">위치 수집 후 다른 사용자와의 거리가 표시됩니다.</div>
        </div>
      </div>

      <div class="bottom-floating-bar">
        <button id="shareToggleBtn">위치 공유 중지</button>
        <button id="hideMyMarkerBtn" class="secondary">내 마커 숨기기</button>
        <button id="meetingBtn" class="cta">지금 모이기 (5분)</button>
        <button id="presetSaveBtn" class="secondary">절전 60초</button>
        <button id="presetFocusBtn" class="secondary">집중 10초</button>
        <button id="myLocationBtn" class="secondary">내 위치</button>
        <button id="fitAllBtn" class="secondary">전체 보기</button>
      </div>
      <label class="leave-toggle">
        <input type="checkbox" id="autoPauseOnLeaveToggle" checked />
        <span>앱 이탈 시 자동 공유 중지</span>
      </label>
      <div class="toast" id="toast"></div>
    </section>
  </div>

  <script src="./config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="./app.js"></script>
</body>
</html>
